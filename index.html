<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1 class="app__title">Todo</h1>
        <p class="app__subtitle">记录今天要做的事</p>
      </header>

      <section class="composer" aria-label="新增待办">
        <div class="composer__row">
          <input
            type="text"
            class="composer__input"
            placeholder="添加待办事项…"
            aria-label="待办内容"
          />
          <button type="button" class="composer__add">Add</button>
        </div>
      </section>

      <section class="list-panel" aria-label="待办列表">
        <ul class="todo-list"></ul>
        <p class="list-panel__empty">还没有待办，添加一条吧。</p>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
