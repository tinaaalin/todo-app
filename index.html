<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <h1 class="app__title">Todo</h1>
        <p class="app__subtitle">记录今天要做的事</p>
      </header>

      <section class="composer" aria-label="新增待办">
        <div class="composer__row">
          <input
            type="text"
            class="composer__input"
            placeholder="添加待办事项…"
            aria-label="待办内容"
          />
          <button type="button" class="composer__add">Add</button>
        </div>
      </section>

      <section class="list-panel" aria-label="待办列表">
        <ul class="todo-list"></ul>
        <p class="list-panel__empty">还没有待办，添加一条吧。</p>
      </section>

      <p class="app__version"></p>
    </main>
    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
